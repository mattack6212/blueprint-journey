# /start/*
[[redirects]]
  from = "/start/*"
  to = "/start/:splat"
  status = 200
  conditions = {Role = ["*"]}

[[redirects]]
  from = "/start/*"
  to = "/login.html"
  status = 302
  force = true

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
