[build]
  publish = "."

# ── Clean URL rewrites ────────────────────────────────────────────────────────
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/lesson"
  to = "/lesson.html"
  status = 200

# ── Server-side auth gating ───────────────────────────────────────────────────
# Each protected path needs two rules in order:
#   1. Role-gated pass-through (authenticated users get the real page)
#   2. Catch-all redirect to /login.html (unauthenticated users — force = true)

# /dashboard.html
[[redirects]]
  from = "/dashboard.html"
  to = "/dashboard.html"
  status = 200
  conditions = {Role = ["*"]}

[[redirects]]
  from = "/dashboard.html"
  to = "/login.html"
  status = 302
  force = true

# /lesson.html
[[redirects]]
  from = "/lesson.html"
  to = "/lesson.html"
  status = 200
  conditions = {Role = ["*"]}

[[redirects]]
  from = "/lesson.html"
  to = "/login.html"
  status = 302
  force = true

# /education/*
[[redirects]]
  from = "/education/*"
  to = "/education/:splat"
  status = 200
  conditions = {Role = ["*"]}

[[redirects]]
  from = "/education/*"
  to = "/login.html"
  status = 302
  force = true

# /research/*
[[redirects]]
  from = "/research/*"
  to = "/research/:splat"
  status = 200
  conditions = {Role = ["*"]}

[[redirects]]
  from = "/research/*"
  to = "/login.html"
  status = 302
  force = true

# /quickstart/*
[[redirects]]
  from = "/quickstart/*"
  to = "/quickstart/:splat"
  status = 200
  conditions = {Role = ["*"]}

[[redirects]]
  from = "/quickstart/*"
  to = "/login.html"
  status = 302
  force = true

# /getting-to-2500/*
[[redirects]]
  from = "/getting-to-2500/*"
  to = "/getting-to-2500/:splat"
  status = 200
  conditions = {Role = ["*"]}

[[redirects]]
  from = "/getting-to-2500/*"
  to = "/login.html"
  status = 302
