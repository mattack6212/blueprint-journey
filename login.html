<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — The Blueprint Journey</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <p class="login-card__logo">Foundation <span>Financial</span></p>
      <p class="login-card__tagline">The Blueprint Journey</p>

      <h2>Member Login</h2>

      <div class="login-card__error" id="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn btn-primary">Access The Blueprint</button>
      </form>

      <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--color-border);">
        <a href="#" id="member-access-btn" class="btn btn-dark" style="width: 100;">Member Access</a>
        <p style="font-size: 0.75rem; color: var(--color-gray-light); margin-top: 0.75rem;">Temporary test access — bypasses payment</p>
      </div>

      <p class="login-card__footer">
        Don't have an account? <a href="/index.html#pricing">Get access here</a>
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
