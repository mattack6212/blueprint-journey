<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — The Blueprint Journey</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <p class="login-card__logo">Foundation <span>Financial</span></p>
      <p class="login-card__tagline">The Blueprint Journey</p>

      <h2>Member Login</h2>

      <div class="login-card__error" id="login-error" style="display:none;"></div>

      <button type="button" id="open-login-btn" class="btn btn-primary">Access The Blueprint</button>

      <p class="login-card__footer">
        Don't have an account? <a href="/enroll/">Get access here</a>
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
